<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log In | Projbahn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-stone-950 text-stone-100">
    <main class="mx-auto flex min-h-screen max-w-md items-center px-4 py-8">
        <section class="w-full rounded-3xl border border-stone-800 bg-stone-900/90 p-6 shadow-2xl">
            <p class="text-xs uppercase tracking-[0.3em] text-cyan-400">Projbahn</p>
            <h1 class="mt-3 text-3xl font-semibold text-stone-50">Log in</h1>
            <p class="mt-2 text-sm text-stone-400">Use your Django user account to access the workspace.</p>

            {% if form.errors %}
                <div class="mt-4 rounded-2xl border border-rose-500/40 bg-rose-500/10 px-4 py-3 text-sm text-rose-100">
                    Invalid username or password.
                </div>
            {% endif %}

            <form method="post" class="mt-6 space-y-4">
                {% csrf_token %}
                <div>
                    <label for="{{ form.username.id_for_label }}" class="mb-1 block text-xs uppercase tracking-wide text-stone-400">Username</label>
                    <input id="{{ form.username.id_for_label }}" name="{{ form.username.html_name }}" class="w-full rounded-xl border border-stone-700 bg-stone-950 px-3 py-2 text-sm text-stone-100">
                </div>
                <div>
                    <label for="{{ form.password.id_for_label }}" class="mb-1 block text-xs uppercase tracking-wide text-stone-400">Password</label>
                    <input type="password" id="{{ form.password.id_for_label }}" name="{{ form.password.html_name }}" class="w-full rounded-xl border border-stone-700 bg-stone-950 px-3 py-2 text-sm text-stone-100">
                </div>
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                <button type="submit" class="w-full rounded-xl bg-cyan-400 px-4 py-2 text-sm font-semibold text-stone-950">Log in</button>
            </form>
        </section>
    </main>
</body>
</html>
